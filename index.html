<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Fields & McLees</title>

<style>
body {
    background:#1a1a1a;
    font-family:sans-serif;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.card {
    background:#2b1d0e;
    padding:25px;
    border-radius:20px;
    border:3px solid #5d4037;
    max-width:450px;
    width:100%;
}
label {
    margin-top:12px;
    display:block;
    color:#d4af37;
    font-size:12px;
}
input, select {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}
.price-box {
    background:#1b5e20;
    padding:20px;
    border-radius:15px;
    text-align:center;
    margin:15px 0;
    display:none;
}
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#2d5a27;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<form action="https://getform.io/f/m56kua56s1k" method="POST">

<label>Name</label>
<input type="text" id="name" name="name" required>

<label>Phone</label>
<input type="tel" id="phone" name="phone" required>

<label>Address</label>
<input type="text" id="autocomplete" name="address" required>

<div id="priceBox" class="price-box">
<div id="sqftText"></div>
<h2 id="priceLabel">$--</h2>

<input type="hidden" name="price" id="hiddenPrice">
<input type="hidden" name="sqft" id="hiddenSqft">
</div>

<label>Service</label>
<select id="service">
<option value="Weekly">Weekly</option>
<option value="Bi-Weekly">Bi-Weekly</option>
</select>

<label>Add-Ons</label>
<div>
<input type="checkbox" class="addon" data-price="50"> Limb Pickup (+$50)<br>
<input type="checkbox" class="addon" data-price="35"> Flea & Tick Granules (+$35)<br>
<input type="checkbox" class="addon" data-price="30"> Spray Around House (+$30)
</div>

<button type="submit">Submit Quote</button>
<button type="button" onclick="sendText()">Text Me This Quote</button>

</form>
</div>

<canvas id="canvas" width="300" height="300" style="display:none;"></canvas>

<script>
const API_KEY = "YOUR_API_KEY_HERE";
const RATE = 0.0045; // tuned better pricing

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);

    auto.addListener("place_changed", ()=>{
        const place = auto.getPlace();
        if(!place.geometry) return;

        document.getElementById("priceBox").style.display = "block";

        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat,lng){
    const img = new Image();
    img.crossOrigin="Anonymous";

    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

    img.onload = ()=>{
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0);

        const data = ctx.getImageData(0,0,300,300).data;

        let grass=0;

        for(let i=0;i<data.length;i+=4){
            let r=data[i], g=data[i+1], b=data[i+2];

            // MUCH better grass detection
            if(g > r * 1.15 && g > b * 1.15 && g > 70){
                grass++;
            }
        }

        // improved scaling (your old one was way off)
        let sqft = grass * 0.35;

        // realistic caps
        sqft = Math.max(3000, Math.min(20000, sqft));

        window.sqft = Math.round(sqft);

        update();
    };
}

function update(){
    if(!window.sqft) return;

    let price = window.sqft * RATE;

    if(document.getElementById("service").value==="Bi-Weekly"){
        price *= 1.25;
    }

    // add-ons
    document.querySelectorAll(".addon:checked").forEach(a=>{
        price += parseFloat(a.dataset.price);
    });

    price = Math.round(price);

    document.getElementById("sqftText").innerText =
        "Est Lawn: " + window.sqft.toLocaleString() + " sq ft";

    document.getElementById("priceLabel").innerText = "$" + price;

    document.getElementById("hiddenPrice").value = price;
    document.getElementById("hiddenSqft").value = window.sqft;

    window.price = price;
}

document.getElementById("service").onchange = update;
document.querySelectorAll(".addon").forEach(a=>a.onchange=update);

function sendText(){
    if(!window.price) return alert("Enter address first");

    const name=document.getElementById("name").value;
    const phone=document.getElementById("phone").value;

    const msg = `New Lead:
${name}
${phone}
${window.sqft} sqft
$${window.price}`;

    window.location.href = `sms:4174991916?body=${encodeURIComponent(msg)}`;
}
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

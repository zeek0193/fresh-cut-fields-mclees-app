<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees</title>
    <style>
        body { background: #1a1a1a; font-family: sans-serif; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #2b1d0e; padding: 25px; border-radius: 20px; border: 3px solid #5d4037; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-align: center; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; color: #d4af37; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #5d4037; font-size: 16px; background: #fff; color: #333; }
        .price-display { background: linear-gradient(180deg, #1b5e20, #2d5a27); padding: 20px; border-radius: 15px; text-align: center; margin: 15px 0; display: none; border: 2px solid #d4af37; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: #fff; border: 2px solid #d4af37; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #444; border-color: #666; cursor: not-allowed; opacity: 0.6; }
        #analysisCanvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Fresh Cut Fields & McLees</h1>
    
    <form action="https://getform.io/f/m56kua56s1k" method="POST" id="mainForm">
        
        <label>Name</label>
        <input type="text" name="name" placeholder="Full Name" required>

        <label>Phone</label>
        <input type="tel" name="phone" placeholder="417-000-0000" required>

        <label>Address</label>
        <input type="text" id="autocomplete" name="address" placeholder="Start typing address..." required>

        <div id="priceBox" class="price-display">
            <div id="statusText" style="font-size: 11px; color: #f1e5ac;">SCANNING PROPERTY...</div>
            <h2 id="priceLabel" style="font-size: 40px; margin: 5px 0;">--</h2>
            
            <input type="hidden" name="quote_total" id="hiddenPrice">
            <input type="hidden" name="lawn_sqft" id="hiddenSqft">
        </div>

        <label>Service Frequency</label>
        <select name="service" id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="Bi-Weekly">Bi-Weekly Mowing</option>
        </select>

        <button type="submit" id="submitBtn" disabled>Enter Address for Quote</button>
    </form>
</div>

<canvas id="analysisCanvas" width="300" height="300"></canvas>

<script>
    const API_KEY = 'AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk'; 
    const RATE = 0.0035; 

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const auto = new google.maps.places.Autocomplete(input, { types: ['address'] });

        auto.addListener('place_changed', function() {
            const place = auto.getPlace();
            if (!place.geometry) return;

            document.getElementById('priceBox').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "Analyzing Satellite...";

            runAnalysis(place.geometry.location.lat(), place.geometry.location.lng());
        });
    }

    function runAnalysis(lat, lng) {
        const canvas = document.getElementById('analysisCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            const pixels = ctx.getImageData(0, 0, 300, 300).data;
            let greenery = 0;

            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i+1] > pixels[i] && pixels[i+1] > pixels[i+2]) greenery++;
            }

            let sqft = Math.max(3500, Math.round((greenery * 0.17) / 100) * 100);
            updatePrice(sqft);
        };
    }

    function updatePrice(sqft) {
        window.currentSqFt = sqft;
        let p = sqft * RATE;
        if (document.getElementById('service').value === "Bi-Weekly") p *= 1.25;
        
        const finalP = Math.round(p);
        document.getElementById('statusText').innerText = "EST. AREA: " + sqft.toLocaleString() + " SQ FT";
        document.getElementById('priceLabel').innerText = "$" + finalP;
        
        // Push data to hidden inputs BEFORE unlocking the button
        document.getElementById('hiddenPrice').value = "$" + finalP;
        document.getElementById('hiddenSqft').value = sqft + " sqft";
        
        document.getElementById('submitBtn').innerText = "Send Quote Request";
        document.getElementById('submitBtn').disabled = false;
    }

    document.getElementById('service').onchange = function() {
        if(window.currentSqFt) updatePrice(window.currentSqFt);
    };
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Fields & McLees</title>

<style>
body {
    background:#1a1a1a;
    font-family:sans-serif;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.logo-box {
    text-align:center;
    margin-bottom:20px;
}
.logo-box img {
    width:350px;
    max-width:100%;
    border-radius:12px;
    border:2px solid #d4af37;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
.card {
    background:#2b1d0e;
    padding:25px;
    border-radius:20px;
    border:3px solid #5d4037;
    max-width:450px;
    width:100%;
}
label {
    margin-top:12px;
    display:block;
    color:#d4af37;
    font-size:12px;
    font-weight: bold;
    text-transform: uppercase;
}
input, select {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:none;
    box-sizing: border-box;
}
.price-box {
    background: linear-gradient(180deg, #1b5e20, #2d5a27);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    margin: 15px 0;
    display: none;
    border: 2px solid #d4af37;
}
.addon-section {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 8px;
    margin-top: 5px;
    border: 1px solid #5d4037;
}
.addon-item {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
    font-size: 14px;
}
.addon-item input {
    width: 18px;
    height: 18px;
    margin-right: 10px;
}
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#2d5a27;
    color:#fff;
    border: 2px solid #d4af37;
    border-radius:10px;
    font-size:18px;
    font-weight: bold;
    cursor: pointer;
}
.btn-text {
    background: #5d4037;
    border-color: #d4af37;
}
</style>
</head>

<body>

<div class="logo-box">
    <img src="IMG_20260325_165435.jpg" alt="Fresh Cut Fields & McLees">
    <p style="color:#f1e5ac; font-weight:bold; margin-top:10px; font-size: 18px;">
        Call/Text: 417-499-1916
    </p>
</div>

<div class="card">
<form action="https://getform.io/f/m56kua56s1k" method="POST" id="mainForm">

<label>Customer Name</label>
<input type="text" id="name" name="name" placeholder="John Doe" required>

<label>Phone Number</label>
<input type="tel" id="phone" name="phone" placeholder="417-000-0000" required>

<label>Service Address</label>
<input type="text" id="autocomplete" name="address" placeholder="Type address for satellite scan..." required>

<div id="priceBox" class="price-box">
    <div id="sqftText" style="font-size: 12px; color: #f1e5ac;"></div>
    <h2 id="priceLabel" style="font-size: 40px; margin: 5px 0;">$--</h2>

    <input type="hidden" name="price" id="hiddenPrice">
    <input type="hidden" name="sqft" id="hiddenSqft">
</div>

<label>Mowing Frequency</label>
<select id="service" name="frequency">
    <option value="Weekly">Weekly Mowing</option>
    <option value="Bi-Weekly">Bi-Weekly Mowing</option>
</select>

<label>Premium Add-Ons</label>
<div class="addon-section">
    <div class="addon-item">
        <input type="checkbox" class="addon" name="limb_pickup" data-price="50"> 
        <span>Limb Pickup (+$50)</span>
    </div>
    <div class="addon-item">
        <input type="checkbox" class="addon" name="flea_tick" data-price="35"> 
        <span>Flea & Tick Granules (+$35)</span>
    </div>
    <div class="addon-item">
        <input type="checkbox" class="addon" name="bug_spray" data-price="30"> 
        <span>Perimeter Bug Spray (+$30)</span>
    </div>
</div>

<button type="submit" id="submitBtn">Submit Official Quote</button>
<button type="button" class="btn-text" onclick="sendText()">Text Me This Quote</button>

</form>
</div>

<canvas id="canvas" width="300" height="300" style="display:none;"></canvas>

<script>
const API_KEY = "AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk";
const RATE = 0.0045;

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input, { types: ['address'] });

    auto.addListener("place_changed", ()=>{
        const place = auto.getPlace();
        if(!place.geometry) return;

        document.getElementById("priceBox").style.display = "block";
        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat,lng){
    const img = new Image();
    img.crossOrigin="Anonymous";
    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

    img.onload = ()=>{
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0);

        const data = ctx.getImageData(0,0,300,300).data;
        let grass=0;

        for(let i=0;i<data.length;i+=4){
            let r=data[i], g=data[i+1], b=data[i+2];
            // Detects green pixels specifically for Joplin area lawns
            if(g > r * 1.15 && g > b * 1.15 && g > 70){
                grass++;
            }
        }

        let sqft = grass * 0.35;
        sqft = Math.max(3000, Math.min(20000, sqft));
        window.sqft = Math.round(sqft);
        update();
    };
}

function update(){
    if(!window.sqft) return;

    let price = window.sqft * RATE;

    if(document.getElementById("service").value==="Bi-Weekly"){
        price *= 1.25;
    }

    document.querySelectorAll(".addon:checked").forEach(a=>{
        price += parseFloat(a.dataset.price);
    });

    price = Math.round(price);

    document.getElementById("sqftText").innerText = "Est Lawn: " + window.sqft.toLocaleString() + " sq ft";
    document.getElementById("priceLabel").innerText = "$" + price;
    document.getElementById("hiddenPrice").value = "$" + price;
    document.getElementById("hiddenSqft").value = window.sqft + " sqft";
    window.price = price;
}

document.getElementById("service").onchange = update;
document.querySelectorAll(".addon").forEach(a=>a.onchange=update);

function sendText(){
    if(!window.price) return alert("Select an address first to generate a quote.");

    const name=document.getElementById("name").value || "Customer";
    const phone=document.getElementById("phone").value || "N/A";
    const address=document.getElementById("autocomplete").value;

    const msg = `Fresh Cut Fields Lead:
Name: ${name}
Phone: ${phone}
Address: ${address}
Lawn: ${window.sqft} sqft
Total Quote: $${window.price}`;

    window.location.href = `sms:4174991916?body=${encodeURIComponent(msg)}`;
}
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields - Instant Quote</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 480px; width: 100%; border-top: 6px solid #2d5a27; margin-top: 10px; }
        h1 { color: #2d5a27; text-align: center; margin-bottom: 5px; font-size: 24px; }
        p.phone { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        label { display: block; margin-top: 15px; font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; font-size: 14px; }
        .checkbox-item input { width: auto; margin-right: 12px; margin-bottom: 0; transform: scale(1.3); }
        .price-box { background: #e8f5e9; padding: 20px; border-radius: 15px; text-align: center; display: none; margin: 15px 0; border: 2px solid #2d5a27; }
        .price-box p { margin: 0; color: #2e7d32; font-size: 14px; }
        .price-box h2 { margin: 5px 0; color: #1b5e20; font-size: 42px; font-weight: 900; }
        .disclaimer { font-size: 10px; color: #888; margin-top: 10px; line-height: 1.4; font-style: italic; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Fresh Cut Fields</h1>
    <p class="phone">Call or Text: 417-499-1916</p>
    
    <form id="quoteForm">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="Full Name" required>
        
        <label>Property Address</label>
        <input type="text" id="autocomplete" placeholder="Enter Address..." required>
        
        <div id="priceBox" class="price-box">
            <p id="sqftLabel"></p>
            <h2 id="priceLabel"></h2>
            <p class="disclaimer">*Estimate based on property footprint. Final price confirmed on arrival.</p>
        </div>

        <label>Mowing Frequency</label>
        <select id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="BiWeekly">Bi-Weekly Mowing (+20%)</option>
        </select>

        <label>Add-On Services</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="50"> Limb Pick Up (+$50)</label>
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="75"> Gutter Cleaning (+$75)</label>
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="35"> Tick & Flea Granules (+$35)</label>
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="30"> Perimeter Bug Spray (+$30)</label>
        </div>
        
        <textarea id="notes" placeholder="Any special instructions?"></textarea>
        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
    // --- ADJUST THESE NUMBERS TO CHANGE PRICING ---
    const COST_PER_SQFT = 0.006;  // Lowered from 0.0078 to be more competitive
    const MINIMUM_PRICE = 40.00;  // The lowest you will ever charge for a trip
    const GRASS_RATIO = 0.40;     // Assumes 40% of the lot is actual grass
    const BIWEEKLY_BUMP = 1.20;   // 20% extra for bi-weekly instead of 25%
    // ----------------------------------------------

    let currentSqFt = 0;

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const autocomplete = new google.maps.places.Autocomplete(input, { 
            types: ['address'], 
            componentRestrictions: { country: "us" } 
        });

        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.viewport) return;

            const bounds = place.geometry.viewport;
            const ne = bounds.getNorthEast();
            const sw = bounds.getSouthWest();

            const latMid = (ne.lat() + sw.lat()) / 2.0;
            const mPerDegLat = 111132;
            const mPerDegLng = 111412 * Math.cos(latMid * Math.PI / 180);

            const widthFt = Math.abs(ne.lng() - sw.lng()) * mPerDegLng * 3.28084;
            const heightFt = Math.abs(ne.lat() - sw.lat()) * mPerDegLat * 3.28084;

            let rawArea = widthFt * heightFt;

            // REFINED CALCULATION
            // Google viewports are roughly 4.5x larger than a standard residential lot.
            let estimatedGrass = Math.round((rawArea / 4.5) * GRASS_RATIO);

            // JOPLIN RESIDENTIAL LIMITS
            if (estimatedGrass > 18000) {
                currentSqFt = 15000; // Cap for large lots to keep price reasonable
            } else if (estimatedGrass < 4000) {
                currentSqFt = 6000;  // Standard small city lot
            } else {
                currentSqFt = estimatedGrass;
            }

            updatePrice();
        });
    }

    function updatePrice() {
        if (currentSqFt === 0) return;
        
        let baseMowPrice = currentSqFt * COST_PER_SQFT;
        
        // Apply Frequency Multiplier
        if (document.getElementById('service').value === "BiWeekly") {
            baseMowPrice = baseMowPrice * BIWEEKLY_BUMP;
        }

        // Apply Minimum Price
        if (baseMowPrice < MINIMUM_PRICE) baseMowPrice = MINIMUM_PRICE;

        // Add Checkbox Extras
        let addonTotal = 0;
        document.querySelectorAll('.addon:checked').forEach(box => {
            addonTotal += parseFloat(box.getAttribute('data-price'));
        });

        let totalPrice = baseMowPrice + addonTotal;

        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('sqftLabel').innerText = "Est. Mowable Area: " + currentSqFt.toLocaleString() + " sq ft";
        document.getElementById('priceLabel').innerText = "$" + Math.round(totalPrice);
    }

    document.getElementById('service').addEventListener('change', updatePrice);
    document.querySelectorAll('.addon').forEach(item => {
        item.addEventListener('change', updatePrice);
    });

    document.

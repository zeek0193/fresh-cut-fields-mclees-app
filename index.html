<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Fields & McLees</title>

<style>
body {
    background:#1a1a1a;
    font-family:sans-serif;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.logo-box {
    text-align:center;
    margin-bottom:20px;
}
.logo-box img {
    width:350px;
    max-width:100%;
    border-radius:12px;
    border:2px solid #d4af37;
}
.card {
    background:#2b1d0e;
    padding:25px;
    border-radius:20px;
    border:3px solid #5d4037;
    max-width:450px;
    width:100%;
}
label {
    margin-top:12px;
    display:block;
    color:#d4af37;
    font-size:12px;
}
input, select {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}
.price-box {
    background:#1b5e20;
    padding:20px;
    border-radius:15px;
    text-align:center;
    margin:15px 0;
    display:none;
}
.addon {
    margin-right:8px;
}
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#2d5a27;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="logo-box">
    <img src="IMG_20260325_165435.jpg">
    <p>417-499-1916</p>
</div>

<div class="card">
<form action="https://getform.io/f/m56kua56s1k" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Phone</label>
<input type="tel" name="phone" required>

<label>Address</label>
<input type="text" id="autocomplete" required>

<div id="priceBox" class="price-box">
    <div id="sqftText"></div>
    <h2 id="priceLabel">$--</h2>

    <input type="hidden" name="price" id="hiddenPrice">
    <input type="hidden" name="sqft" id="hiddenSqft">
</div>

<label>Service</label>
<select id="service">
<option value="Weekly">Weekly</option>
<option value="Bi-Weekly">Bi-Weekly</option>
</select>

<label>Add-ons</label>
<div>
<input type="checkbox" class="addon" data-price="50"> Limb Pickup (+$50)<br>
<input type="checkbox" class="addon" data-price="35"> Flea & Tick (+$35)<br>
<input type="checkbox" class="addon" data-price="30"> Bug Spray (+$30)
</div>

<button type="submit">Submit Quote</button>

</form>
</div>

<script>
const API_KEY = "AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk";

// ===== AUTOCOMPLETE =====
function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);

    auto.addListener("place_changed", ()=>{
        const place = auto.getPlace();
        if(!place.geometry) return;

        estimateLot(place);
    });
}

// ===== PRO LOT SIZE ESTIMATION =====
function estimateLot(place){
    const bounds = place.geometry.viewport;

    const ne = bounds.getNorthEast();
    const sw = bounds.getSouthWest();

    const latDiff = Math.abs(ne.lat() - sw.lat());
    const lngDiff = Math.abs(ne.lng() - sw.lng());

    const metersPerLat = 111320;
    const metersPerLng = 111320 * Math.cos(ne.lat() * Math.PI / 180);

    const width = lngDiff * metersPerLng;
    const height = latDiff * metersPerLat;

    let lotSqFt = (width * height) * 10.764;

    // 🔥 SMART LAWN % DETECTION
    let lawnPercent = 0.55;

    if(lotSqFt < 6000) lawnPercent = 0.65;
    else if(lotSqFt < 10000) lawnPercent = 0.60;
    else if(lotSqFt < 20000) lawnPercent = 0.55;
    else lawnPercent = 0.50;

    let lawnSqFt = Math.round(lotSqFt * lawnPercent);

    window.sqft = lawnSqFt;

    updatePrice();
}

// ===== PRO PRICING =====
function updatePrice(){
    if(!window.sqft) return;

    let price = 0;

    if(window.sqft <= 5000){
        price = 45;
    }
    else if(window.sqft <= 8000){
        price = 60;
    }
    else if(window.sqft <= 12000){
        price = window.sqft * 0.007;
    }
    else if(window.sqft <= 20000){
        price = window.sqft * 0.006;
    }
    else{
        price = window.sqft * 0.005;
    }

    if(document.getElementById("service").value === "Bi-Weekly"){
        price *= 1.25;
    }

    document.querySelectorAll(".addon:checked").forEach(a=>{
        price += parseFloat(a.dataset.price);
    });

    price = Math.round(price);

    document.getElementById("priceBox").style.display = "block";
    document.getElementById("sqftText").innerText = window.sqft.toLocaleString() + " sq ft lawn";
    document.getElementById("priceLabel").innerText = "$" + price;

    document.getElementById("hiddenPrice").value = price;
    document.getElementById("hiddenSqft").value = window.sqft;

    window.price = price;
}

document.getElementById("service").onchange = updatePrice;
document.querySelectorAll(".addon").forEach(a=>a.onchange = updatePrice);

</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

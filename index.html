<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees</title>
    <style>
        body { 
            background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #fff;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            max-width: 480px;
            width: 100%;
        }
        .logo-placeholder {
            background: #000;
            border: 2px solid #d4af37;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: #d4af37;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
        }
        .card { 
            background: rgba(43, 29, 14, 0.95); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            max-width: 480px; 
            width: 100%; 
            border: 3px solid #5d4037; 
            position: relative;
        }
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background: linear-gradient(90deg, #d4af37, #f1e5ac, #d4af37);
            border-radius: 20px 20px 0 0;
        }
        h2.card-title { 
            color: #d4af37; 
            text-align: center; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 22px;
        }
        label { display: block; margin-top: 15px; font-size: 11px; font-weight: bold; color: #d4af37; text-transform: uppercase; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin: 5px 0 10px; 
            border: 1px solid #5d4037; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; 
            background: #fffdfa; color: #333;
        }
        .price-box { 
            background: linear-gradient(180deg, #1b5e20, #2d5a27); 
            padding: 20px; border-radius: 15px; 
            text-align: center; display: none; margin: 15px 0; 
            border: 2px solid #d4af37; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .price-box p { margin: 0; color: #f1e5ac; font-size: 14px; font-weight: bold; }
        .price-box h2 { margin: 5px 0; color: #fff; font-size: 42px; text-shadow: 2px 2px 4px #000; }
        
        .checkbox-group { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid #5d4037; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; color: #f1e5ac; }
        .checkbox-item input { width: auto; margin-right: 12px; transform: scale(1.3); }
        
        button { 
            width: 100%; padding: 18px; 
            background: linear-gradient(180deg, #2d5a27, #1b5e20); 
            color: white; border: 2px solid #d4af37; 
            border-radius: 12px; font-size: 20px; font-weight: bold; 
            cursor: pointer; margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #143314;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #143314; }
        .footer-text { text-align: center; font-size: 12px; color: #d4af37; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="logo-container">
    <div class="logo-placeholder">FRESH CUT FIELDS & McLEES</div>
    <p style="color: #f1e5ac; margin-top: 5px;">Call/Text: 417-499-1916</p>
</div>

<div class="card">
    <h2 class="card-title">Instant Quote</h2>
    
    <form id="quoteForm">
        <input type="text" id="userName" placeholder="Name" required>
        <input type="text" id="autocomplete" placeholder="1402 Reinmiller Rd, Joplin, MO..." required autocomplete="off">
        
        <div id="priceBox" class="price-box">
            <p id="sqftLabel"></p>
            <h2 id="priceLabel"></h2>
        </div>

        <select id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="BiWeekly">Bi-Weekly Mowing</option>
        </select>

        <label>Add-On Services</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="35"> Tick & Flea Granules</label>
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="30"> Perimeter Bug Spray</label>
            <label class="checkbox-item"><input type="checkbox" class="addon" data-price="50"> Limb Pick Up</label>
        </div>
        
        <textarea id="notes" placeholder="Additional Notes"></textarea>
        <button type="submit">Get Instant Quote</button>
    </form>
</div>

<div class="footer-text">Lawn Care • Landscaping • Property Maintenance</div>

<script>
    const COST_PER_SQFT = 0.007; 
    const MINIMUM_PRICE = 45.00; 

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const autocomplete = new google.maps.places.Autocomplete(input, { 
            types: ['address'], 
            componentRestrictions: { country: "us" } 
        });

        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.viewport) return;

            const bounds = place.geometry.viewport;
            const latMid = (bounds.getNorthEast().lat() + bounds.getSouthWest().lat()) / 2.0;
            const mPerDegLat = 111132;
            const mPerDegLng = 111412 * Math.cos(latMid * Math.PI / 180);

            const widthFt = Math.abs(bounds.getNorthEast().lng() - bounds.getSouthWest().lng()) * mPerDegLng * 3.28084;
            const heightFt = Math.abs(bounds.getNorthEast().lat() - bounds.getSouthWest().lat()) * mPerDegLat * 3.28084;

            // NEW BALANCED MATH FOR JOPLIN AREA
            let estimatedGrass = Math.round((widthFt * heightFt / 4.8) * 0.45);

            // REALITY CHECK CAPPING
            if (estimatedGrass > 20000) window.currentSqFt = 16000;
            else if (estimatedGrass < 4000) window.currentSqFt = 7000;
            else window.currentSqFt = estimatedGrass;

            updatePrice();
        });
    }

    function updatePrice() {
        if (!window.currentSqFt) return;
        
        let price = window.currentSqFt * COST_PER_SQFT;
        if (document.getElementById('service').value === "BiWeekly") price *= 1.20;
        if (price < MINIMUM_PRICE) price = MINIMUM_PRICE;

        let addons = 0;
        document.querySelectorAll('.addon:checked').forEach(box => addons += parseFloat(box.getAttribute('data-price')));

        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('sqftLabel').innerText = "Est. Lawn: " + window.currentSqFt.toLocaleString() + " sq ft";
        document.getElementById('priceLabel').innerText = "$" + Math.round(price + addons);
    }

    document.getElementById('service').addEventListener('change', updatePrice);
    document.querySelectorAll('.addon').forEach(item => item.addEventListener('change', updatePrice));
    document.getElementById('quoteForm').addEventListener('submit', (e) => { e.preventDefault(); alert("Request Sent!"); });
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

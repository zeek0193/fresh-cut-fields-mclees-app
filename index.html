<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields - Instant Quote</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border-top: 6px solid #2d5a27; }
        h1 { color: #2d5a27; text-align: center; margin-bottom: 5px; font-size: 28px; }
        p.phone { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        label { display: block; margin-top: 15px; font-size: 12px; font-weight: bold; color: #444; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #2d5a27; outline: none; box-shadow: 0 0 0 2px rgba(45,90,39,0.1); }
        .price-box { background: #e8f5e9; padding: 20px; border-radius: 15px; text-align: center; display: none; margin: 15px 0; border: 1px solid #c8e6c9; }
        .price-box p { margin: 0; color: #2e7d32; font-size: 14px; }
        .price-box h2 { margin: 5px 0; color: #1b5e20; font-size: 32px; }
        .disclaimer { font-size: 10px; color: #888; margin-top: 10px; line-height: 1.4; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #1e3d1a; }
    </style>
</head>
<body>

<div class="card">
    <h1>Fresh Cut Fields</h1>
    <p class="phone">Call or Text: 417-499-1916</p>
    
    <form id="quoteForm">
        <label>Contact Info</label>
        <input type="text" id="userName" placeholder="Your Name" required>
        
        <label>Property Address</label>
        <input type="text" id="autocomplete" placeholder="Start typing address..." required>
        
        <div id="priceBox" class="price-box">
            <p id="sqftLabel"></p>
            <h2 id="priceLabel"></h2>
            <p class="disclaimer">*Estimate based on satellite data. Final price verified on-site.</p>
        </div>

        <label>Service Type</label>
        <select id="service">
            <option value="Mowing">Standard Mowing</option>
            <option value="Limb Pick Up">Limb Pick Up (+ $50)</option>
            <option value="Gutter Cleaning">Gutter Cleaning (+ $75)</option>
            <option value="Landscaping">Landscaping (+ $100)</option>
        </select>
        
        <label>Notes</label>
        <textarea id="notes" placeholder="Gate codes, pets, or specific requests..."></textarea>
        
        <button type="submit">Get Instant Quote</button>
    </form>
</div>

<script>
    let currentSqFt = 0;

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const options = {
            types: ['address'],
            componentRestrictions: { country: "us" }
        };

        const autocomplete = new google.maps.places.Autocomplete(input, options);

        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.viewport) return;

            // NEW REFINED MATH
            const bounds = place.geometry.viewport;
            const ne = bounds.getNorthEast();
            const sw = bounds.getSouthWest();

            // Convert Lat/Lng degree differences to meters
            const latDist = Math.abs(ne.lat() - sw.lat()) * 111320; 
            const lngDist = Math.abs(ne.lng() - sw.lng()) * 40075000 * Math.cos(ne.lat() * Math.PI / 180) / 360;

            // Calculate area of the viewable box in square feet
            let viewAreaSqFt = (latDist * 3.28084) * (lngDist * 3.28084);

            // Refinement: Map viewports are roughly 3-4x larger than the actual lot.
            // We assume 50% of the lot is actual mowable grass (subtracting house/drive).
            let estimatedLawn = Math.round((viewAreaSqFt / 3.5) * 0.50);

            // SAFETY CAP: If math results in over 1 acre (43,560 sq ft) for a residential address,
            // it's likely catching the street/neighbors. We cap it to a large residential lot.
            if (estimatedLawn > 40000) {
                currentSqFt = 12500; 
            } else {
                currentSqFt = estimatedLawn;
            }

            updatePrice();
        });
    }

    function updatePrice() {
        if (currentSqFt === 0) return;
        
        const service = document.getElementById('service').value;
        
        // Base pricing: $0.012 per sq ft
        let price = currentSqFt * 0.012;
        
        // Minimum charge
        if (price < 40) price = 40;

        // Service add-ons
        if (service === "Gutter Cleaning") price += 75;
        if (service === "Landscaping") price += 100;
        if (service === "Limb Pick Up") price += 50;

        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('sqftLabel').innerText = "Est. Mowable Area: " + currentSqFt.toLocaleString() + " sq ft";
        document.getElementById('priceLabel').innerText = "$" + Math.round(price);
    }

    document.getElementById('service').addEventListener('change', updatePrice);
    
    document.getElementById('quoteForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('userName').value;
        const finalPrice = document.getElementById('priceLabel').innerText;
        alert("Thanks " + name + "! Your estimate of " + finalPrice + " has been logged. We will contact you shortly.");
    });
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

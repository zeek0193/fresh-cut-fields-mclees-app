<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees - Custom Quote</title>
    <style>
        body { background:#1a1a1a; font-family:sans-serif; color:#fff; padding:20px; display:flex; flex-direction:column; align-items:center; }
        .logo-box { text-align:center; margin-bottom:20px; }
        .logo-box img { width:300px; max-width:100%; border-radius:12px; border:2px solid #d4af37; }
        .card { background:#2b1d0e; padding:20px; border-radius:20px; border:3px solid #5d4037; max-width:600px; width:100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #map { width: 100%; height: 400px; border-radius: 12px; margin: 15px 0; border: 2px solid #d4af37; display: none; }
        label { margin-top:12px; display:block; color:#d4af37; font-size:12px; font-weight: bold; text-transform: uppercase; }
        input, select { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:none; box-sizing: border-box; background: #fff; color: #000; }
        .price-box { background: linear-gradient(180deg, #1b5e20, #2d5a27); padding: 15px; border-radius: 15px; text-align: center; margin: 15px 0; border: 2px solid #d4af37; display: none; }
        button { width:100%; padding:18px; margin-top:10px; background:#2d5a27; color:#fff; border: 2px solid #d4af37; border-radius:12px; font-size:18px; font-weight: bold; cursor: pointer; }
        .instructions { font-size: 13px; color: #d4af37; margin-bottom: 10px; text-align: center; font-style: italic; }
        .trap { display: none !important; }
    </style>
</head>
<body>

<div class="logo-box">
    <img src="IMG_20260325_165435.jpg" alt="Fresh Cut Fields & McLees">
</div>

<div class="card">
    <form action="https://formspree.io/f/mqewkjrv" method="POST" id="mainForm">
        <label>Step 1: Enter Address</label>
        <input type="text" id="autocomplete" name="Address" required placeholder="Type your address here...">

        <div id="map-container">
            <div id="map"></div>
            <p id="map-msg" class="instructions" style="display:none;">Click the corners of your lawn to outline the area you want mowed.</p>
        </div>

        <div id="priceBox" class="price-box">
            <h2 id="priceLabel" style="font-size: 40px; margin: 5px 0;">$--</h2>
            <p id="sqftDisplay" style="margin:0; font-size:12px;">Area: 0 sqft</p>
            <input type="hidden" name="Quote_Total" id="hiddenPrice">
            <input type="hidden" name="Lawn_Sqft" id="hiddenSqft">
        </div>

        <label>Mowing Frequency</label>
        <select name="Frequency" id="service">
            <option value="Weekly">Weekly (Standard)</option>
            <option value="Bi-Weekly">Bi-Weekly (+35%)</option>
        </select>

        <label>Your Name & Phone</label>
        <input type="text" name="Name" required placeholder="Name">
        <input type="tel" name="Phone" required placeholder="Phone Number">

        <input type="text" name="_gotcha" class="trap" tabindex="-1">

        <button type="submit" id="submitBtn">Get Quote First</button>
    </form>
</div>

<script>
let map, drawingManager, selectedShape;
const RATE = 0.009;
const BASE_FEE = 40.00;

function initMap() {
    // Initial map setup
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 37.0842, lng: -94.5133 }, // Default to Joplin
        zoom: 12,
        mapTypeId: "satellite",
        tilt: 0
    });

    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);

    auto.addListener("place_changed", () => {
        const place = auto.getPlace();
        if (!place.geometry) return;

        document.getElementById("map").style.display = "block";
        document.getElementById("map-msg").style.display = "block";
        
        map.setCenter(place.geometry.location);
        map.setZoom(20); // Zoom in tight on the property
        
        setupDrawing();
    });
}

function setupDrawing() {
    if (drawingManager) return; // Only init once

    drawingManager = new google.maps.drawing.DrawingManager({
        drawingMode: google.maps.drawing.OverlayType.POLYGON,
        drawingControl: true,
        drawingControlOptions: {
            position: google.maps.ControlPosition.TOP_CENTER,
            drawingModes: [google.maps.drawing.OverlayType.POLYGON]
        },
        polygonOptions: {
            fillColor: "#2d5a27",
            fillOpacity: 0.5,
            strokeWeight: 2,
            strokeColor: "#d4af37",
            editable: true,
            draggable: true
        }
    });

    drawingManager.setMap(map);

    google.maps.event.addListener(drawingManager, 'overlaycomplete', function(event) {
        if (selectedShape) selectedShape.setMap(null); // Clear old shape
        selectedShape = event.overlay;
        calculateArea(selectedShape);

        // Update if user edits the shape
        google.maps.event.addListener(selectedShape.getPath(), 'set_at', () => calculateArea(selectedShape));
        google.maps.event.addListener(selectedShape.getPath(), 'insert_at', () => calculateArea(selectedShape));
    });
}

function calculateArea(polygon) {
    const areaSqMeters = google.maps.geometry.spherical.computeArea(polygon.getPath());
    const areaSqFt = areaSqMeters * 10.7639; // Convert to sqft
    window.sqft = Math.round(areaSqFt);

    document.getElementById("priceBox").style.display = "block";
    updatePrice();
}

function updatePrice() {
    if (!window.sqft) return;

    let total = BASE_FEE + (window.sqft * RATE);
    if (document.getElementById("service").value === "Bi-Weekly") total *= 1.35;
    
    let finalPrice = Math.ceil(total / 5) * 5;

    document.getElementById("priceLabel").innerText = "$" + finalPrice;
    document.getElementById("sqftDisplay").innerText = "Calculated Area: " + window.sqft.toLocaleString() + " sqft";
    document.getElementById("hiddenPrice").value = "$" + finalPrice;
    document.getElementById("hiddenSqft").value = window.sqft;
    document.getElementById("submitBtn").innerText = "Submit Quote Request";
}

document.getElementById("service").onchange = updatePrice;

document.getElementById('mainForm').onsubmit = function() {
    if (!window.sqft) {
        alert("Please outline your lawn on the map first!");
        return false;
    }
    document.getElementById("submitBtn").innerText = "Sending...";
    return true;
};
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places,drawing,geometry&callback=initMap"></script>
</body>
</html>

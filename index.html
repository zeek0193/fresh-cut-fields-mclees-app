<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees</title>
    <style>
        body { background: #1a1a1a; font-family: sans-serif; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #2b1d0e; padding: 25px; border-radius: 20px; border: 3px solid #5d4037; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; text-align: center; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; color: #d4af37; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        input[type="text"], input[type="tel"], select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #5d4037; font-size: 16px; background: #fff; color: #333; box-sizing: border-box; }
        
        /* Add-on Styling */
        .addon-row { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #5d4037; }
        .addon-row input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; }
        .addon-row span { font-size: 14px; flex-grow: 1; }
        .addon-price { color: #d4af37; font-weight: bold; font-size: 13px; }

        .price-display { background: linear-gradient(180deg, #1b5e20, #2d5a27); padding: 20px; border-radius: 15px; text-align: center; margin: 15px 0; display: none; border: 2px solid #d4af37; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: #fff; border: 2px solid #d4af37; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #444; border-color: #666; cursor: not-allowed; opacity: 0.6; }
        .trap { display: none !important; }
        #analysisCanvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Fresh Cut Fields & McLees</h1>
    
    <form action="https://getform.io/f/m56kua56s1k" method="POST" id="mainForm">
        
        <label>Name</label>
        <input type="text" name="name" >

        <label>Phone</label>
        <input type="tel" name="phone" >

        <label>Address</label>
        <input type="text" id="autocomplete" name="address" >

        <input type="text" name="confirm_email" class="trap" tabindex="-1" autocomplete="off">

        <div id="priceBox" class="price-display">
            <div id="statusText" style="font-size: 11px; color: #f1e5ac;">SCANNING...</div>
            <h2 id="priceLabel" style="font-size: 40px; margin: 5px 0;">--</h2>
            <input type="hidden" name="quote_total" id="hiddenPrice">
            <input type="hidden" name="area_sqft" id="hiddenSqft">
        </div>

        <label>Mowing Frequency</label>
        <select name="service" id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="Bi-Weekly">Bi-Weekly Mowing</option>
        </select>

        <label>Optional Add-Ons</label>
        
        <div class="addon-row">
            <input type="checkbox" name="limb_pickup" class="addon" data-price="15">
            <span>Limb Pickup</span>
            <span class="addon-price">+$15</span>
        </div>

        <div class="addon-row">
            <input type="checkbox" name="flea_tick" class="addon" data-price="25">
            <span>Flea & Tick Granules</span>
            <span class="addon-price">+$25</span>
        </div>

        <div class="addon-row">
            <input type="checkbox" name="bug_spray" class="addon" data-price="20">
            <span>Perimeter Bug Spray</span>
            <span class="addon-price">+$20</span>
        </div>

        <button type="submit" id="submitBtn" disabled>Scanning Property...</button>
    </form>
</div>

<canvas id="analysisCanvas" width="300" height="300"></canvas>

<script>
    const API_KEY = 'AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk'; 
    const RATE = 0.0035; 

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const auto = new google.maps.places.Autocomplete(input, { types: ['address'] });

        auto.addListener('place_changed', function() {
            const place = auto.getPlace();
            if (!place.geometry) return;

            document.getElementById('priceBox').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = "Analyzing Satellite...";

            runSatelliteScan(place.geometry.location.lat(), place.geometry.location.lng());
        });
    }

    function runSatelliteScan(lat, lng) {
        const canvas = document.getElementById('analysisCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            const pixels = ctx.getImageData(0, 0, 300, 300).data;
            let greenCount = 0;

            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i+1] > pixels[i] && pixels[i+1] > pixels[i+2]) greenCount++;
            }

            // Calculate Sq Ft and store it globally
            window.currentSqFt = Math.max(3000, Math.round((greenCount * 0.175) / 100) * 100);
            
            updateFinalPrice();
            
            document.getElementById('submitBtn').innerText = "Submit Quote Request";
            document.getElementById('submitBtn').disabled = false;
        };
    }

    function updateFinalPrice() {
        if (!window.currentSqFt) return;

        // Base price from satellite
        let basePrice = window.currentSqFt * RATE;
        
        // Bi-weekly premium
        if (document.getElementById('service').value === "Bi-Weekly") basePrice *= 1.25;

        // Add-ons math
        let addonTotal = 0;
        document.querySelectorAll('.addon:checked').forEach(checkbox => {
            addonTotal += parseFloat(checkbox.dataset.price);
        });

        const finalTotal = Math.round(basePrice + addonTotal);

        document.getElementById('statusText').innerText = "EST. AREA: " + window.currentSqFt.toLocaleString() + " SQ FT";
        document.getElementById('priceLabel').innerText = "$" + finalTotal;
        
        document.getElementById('hiddenPrice').value = "$" + finalTotal;
        document.getElementById('hiddenSqft').value = window.currentSqFt + " sqft";
    }

    // Update price when frequency or add-ons change
    document.getElementById('service').onchange = updateFinalPrice;
    document.querySelectorAll('.addon').forEach(checkbox => {
        checkbox.onchange = updateFinalPrice;
    });
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields - Instant Quote</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 480px; width: 100%; border-top: 6px solid #2d5a27; margin-top: 10px; }
        h1 { color: #2d5a27; text-align: center; margin-bottom: 5px; font-size: 24px; }
        p.phone { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        label { display: block; margin-top: 15px; font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        .checkbox-group { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .checkbox-item input { width: auto; margin-right: 10px; margin-bottom: 0; transform: scale(1.2); }
        .price-box { background: #e8f5e9; padding: 20px; border-radius: 15px; text-align: center; display: none; margin: 15px 0; border: 2px solid #2d5a27; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .price-box p { margin: 0; color: #2e7d32; font-size: 14px; }
        .price-box h2 { margin: 5px 0; color: #1b5e20; font-size: 38px; font-weight: 900; }
        .disclaimer { font-size: 10px; color: #888; margin-top: 10px; line-height: 1.4; font-style: italic; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background: #1e3d1a; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h1>Fresh Cut Fields</h1>
    <p class="phone">Call or Text: 417-499-1916</p>
    
    <form id="quoteForm">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="Full Name" required>
        
        <label>Property Address</label>
        <input type="text" id="autocomplete" placeholder="Start typing address..." required>
        
        <div id="priceBox" class="price-box">
            <p id="sqftLabel"></p>
            <h2 id="priceLabel"></h2>
            <p class="disclaimer">*Estimate includes all selected services. Final price verified on arrival.</p>
        </div>

        <label>Mowing Frequency</label>
        <select id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="BiWeekly">Bi-Weekly Mowing (+25%)</option>
        </select>

        <label>Add-On Services</label>
        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" id="checkLimb" class="addon" data-price="50"> Limb Pick Up (+$50)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="checkGutter" class="addon" data-price="75"> Gutter Cleaning (+$75)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="checkPest" class="addon" data-price="45"> Tick & Flea Granules (+$45)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="checkBug" class="addon" data-price="35"> Perimeter Bug Spray (+$35)
            </label>
        </div>
        
        <textarea id="notes" placeholder="Any special instructions? (Pets, Gates, etc.)"></textarea>
        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
    let currentSqFt = 0;

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const autocomplete = new google.maps.places.Autocomplete(input, { 
            types: ['address'], 
            componentRestrictions: { country: "us" } 
        });

        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.geometry || !place.geometry.viewport) return;

            const bounds = place.geometry.viewport;
            const ne = bounds.getNorthEast();
            const sw = bounds.getSouthWest();

            // Coordinate conversion to Feet
            const latMid = (ne.lat() + sw.lat()) / 2.0;
            const mPerDegLat = 111132;
            const mPerDegLng = 111412 * Math.cos(latMid * Math.PI / 180);

            const widthFt = Math.abs(ne.lng() - sw.lng()) * mPerDegLng * 3.28084;
            const heightFt = Math.abs(ne.lat() - sw.lat()) * mPerDegLat * 3.28084;

            let rawArea = widthFt * heightFt;

            // ACCURACY TUNING:
            // Google viewport is usually 4x larger than a standard lot.
            // We assume 48% of the lot is grass (higher than before for better accuracy).
            let estimatedGrass = Math.round((rawArea / 4.2) * 0.48);

            // Sanity Check for Residential Lots
            if (estimatedGrass > 22000) {
                currentSqFt = 18500; // Cap for large lots
            } else if (estimatedGrass < 4500) {
                currentSqFt = 6800;  // Average small lot floor
            } else {
                currentSqFt = estimatedGrass;
            }

            updatePrice();
        });
    }

    function updatePrice() {
        if (currentSqFt === 0) return;
        
        // Base rate $0.0078 per sq ft (approx $55 for 7k sq ft)
        let baseMowPrice = currentSqFt * 0.0078;
        if (baseMowPrice < 45) baseMowPrice = 45;

        // Apply Frequency Multiplier
        const frequency = document.getElementById('service').value;
        if (frequency === "BiWeekly") {
            baseMowPrice = baseMowPrice * 1.25;
        }

        // Add up all checked boxes
        let addonTotal = 0;
        document.querySelectorAll('.addon:checked').forEach(box => {
            addonTotal += parseFloat(box.getAttribute('data-price'));
        });

        let totalPrice = baseMowPrice + addonTotal;

        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('sqftLabel').innerText = "Est. Mowable Area: " + currentSqFt.toLocaleString() + " sq ft";
        document.getElementById('priceLabel').innerText = "$" + Math.round(totalPrice);
    }

    // Update price instantly when any option changes
    document.getElementById('service').addEventListener('change', updatePrice);
    document.querySelectorAll('.addon').forEach(item => {
        item.addEventListener('change', updatePrice);
    });

    document.getElementById('quoteForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("Quote Request Sent! We will contact you shortly to confirm your schedule.");
    });
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

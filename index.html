<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Fields & McLees</title>

<style>
body {
    background:#1a1a1a;
    font-family:sans-serif;
    color:#fff;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.logo-box {
    text-align:center;
    margin-bottom:20px;
}
.logo-box img {
    width:350px;
    max-width:100%;
    border-radius:12px;
    border:2px solid #d4af37;
}
.card {
    background:#2b1d0e;
    padding:25px;
    border-radius:20px;
    border:3px solid #5d4037;
    max-width:450px;
    width:100%;
}
label {
    margin-top:12px;
    display:block;
    color:#d4af37;
    font-size:12px;
    font-weight:bold;
}
input, select {
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}
.price-box {
    background:#1b5e20;
    padding:20px;
    border-radius:15px;
    text-align:center;
    margin:15px 0;
    display:none;
}
.addon-section {
    margin-top:10px;
}
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#2d5a27;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="logo-box">
    <img src="IMG_20260325_165435.jpg">
    <p>Call/Text: 417-499-1916</p>
</div>

<div class="card">
<form>

<label>Name</label>
<input type="text" id="name" required>

<label>Phone</label>
<input type="tel" id="phone" required>

<label>Address</label>
<input type="text" id="autocomplete" required>

<div id="priceBox" class="price-box">
    <div id="sqftText"></div>
    <h2 id="priceLabel">$--</h2>
</div>

<label>Service</label>
<select id="service">
<option value="Weekly">Weekly</option>
<option value="Bi-Weekly">Bi-Weekly</option>
</select>

<label>Add-Ons</label>
<div class="addon-section">
    <input type="checkbox" class="addon" data-price="50"> Limb Pickup (+$50)<br>
    <input type="checkbox" class="addon" data-price="35"> Flea & Tick (+$35)<br>
    <input type="checkbox" class="addon" data-price="30"> Bug Spray (+$30)
</div>

</form>
</div>

<canvas id="canvas" width="300" height="300" style="display:none;"></canvas>

<script>
const API_KEY = "AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk";
const RATE = 0.0045;

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);

    auto.addListener("place_changed", ()=>{
        const place = auto.getPlace();
        if(!place.geometry) return;

        document.getElementById("priceBox").style.display = "block";

        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat,lng){
    const img = new Image();
    img.crossOrigin="Anonymous";
    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

    img.onload = ()=>{
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0);

        const data = ctx.getImageData(0,0,300,300).data;
        let grass=0;

        for(let i=0;i<data.length;i+=4){
            let r=data[i], g=data[i+1], b=data[i+2];
            if(g > r * 1.15 && g > b * 1.15 && g > 70){
                grass++;
            }
        }

        let sqft = grass * 0.35;
        sqft = Math.max(3000, Math.min(20000, sqft));
        window.sqft = Math.round(sqft);

        update();

        autoSendText(); // 🔥 AUTO TEXT
    };
}

function update(){
    if(!window.sqft) return;

    let price = window.sqft * RATE;

    if(document.getElementById("service").value==="Bi-Weekly"){
        price *= 1.25;
    }

    document.querySelectorAll(".addon:checked").forEach(a=>{
        price += parseFloat(a.dataset.price);
    });

    price = Math.round(price);

    document.getElementById("sqftText").innerText = window.sqft + " sq ft";
    document.getElementById("priceLabel").innerText = "$" + price;

    window.price = price;
}

function autoSendText(){
    if(!window.price) return;

    const name = document.getElementById("name").value || "New Lead";
    const phone = document.getElementById("phone").value || "N/A";
    const address = document.getElementById("autocomplete").value;

    let addons = [];
    document.querySelectorAll(".addon:checked").forEach(a=>{
        addons.push(a.parentElement.innerText.trim());
    });

    const msg = `NEW LAWN LEAD

Name: ${name}
Phone: ${phone}
Address: ${address}

Lawn: ${window.sqft} sq ft
Price: $${window.price}

Add-ons: ${addons.length ? addons.join(", ") : "None"}`;

    window.location.href = `sms:4174991916?body=${encodeURIComponent(msg)}`;
}

document.getElementById("service").onchange = update;
document.querySelectorAll(".addon").forEach(a=>a.onchange=update);
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees</title>
    <style>
        body { 
            background: #1a1a1a url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #fff;
        }
        .logo-container { text-align: center; margin-bottom: 20px; max-width: 480px; width: 100%; }
        .logo-img { max-width: 100%; height: auto; border: 2px solid #d4af37; border-radius: 12px; }
        .card { 
            background: rgba(43, 29, 14, 0.95); padding: 25px; border-radius: 20px; 
            max-width: 480px; width: 100%; border: 3px solid #5d4037;
        }
        h2.card-title { color: #d4af37; text-align: center; text-transform: uppercase; font-size: 20px; }
        label { display: block; margin-top: 15px; font-size: 11px; font-weight: bold; color: #d4af37; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin: 5px 0 10px; border-radius: 8px; border: 1px solid #5d4037;
            font-size: 16px; background: #fffdfa; color: #333;
        }
        .price-box { 
            background: linear-gradient(180deg, #1b5e20, #2d5a27); padding: 20px; border-radius: 15px; 
            text-align: center; display: none; margin: 15px 0; border: 2px solid #d4af37; 
        }
        .price-box h2 { margin: 5px 0; color: #fff; font-size: 42px; text-shadow: 2px 2px 4px #000; }
        button { 
            width: 100%; padding: 18px; background: linear-gradient(180deg, #2d5a27, #1b5e20); 
            color: white; border: 2px solid #d4af37; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="IMG_20260325_165435.jpg" alt="Logo" class="logo-img">
    <p style="color: #f1e5ac; margin-top: 10px; font-weight: bold;">417-499-1916</p>
</div>

<div class="card">
    <h2 class="card-title">Free Instant Quote</h2>
    
    <form action="https://getform.io/f/m56kua56s1k" method="POST">
        <input type="hidden" name="_next" value="https://forminit.com/thank-you">
        
        <label>Name</label>
        <input type="text" name="name" placeholder="Your Name" required>
        
        <label>Address</label>
        <input type="text" id="autocomplete" name="address" placeholder="Property Address" required>
        
        <div id="priceBox" class="price-box">
            <h2 id="priceLabel"></h2>
            <input type="hidden" name="quote_total" id="hiddenPrice">
        </div>

        <label>Frequency</label>
        <select name="frequency" id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="BiWeekly">Bi-Weekly Mowing</option>
        </select>

        <label>Add-Ons</label>
        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px;">
            <label style="color: #f1e5ac;"><input type="checkbox" name="tick_flea" class="addon" data-price="35"> Tick & Flea (+$35)</label><br>
            <label style="color: #f1e5ac;"><input type="checkbox" name="bug_spray" class="addon" data-price="30"> Bug Spray (+$30)</label><br>
            <label style="color: #f1e5ac;"><input type="checkbox" name="limb_pickup" class="addon" data-price="50"> Limb Pick Up (+$50)</label>
        </div>
        
        <label>Notes</label>
        <textarea name="message" placeholder="Gates, Dogs, etc."></textarea>
        
        <button type="submit">Submit Quote</button>
    </form>
</div>

<script>
    const COST_PER_SQFT = 0.0035; // Lowered price further
    const MINIMUM_PRICE = 35.00; 

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const autocomplete = new google.maps.places.Autocomplete(input, { types: ['address'], componentRestrictions: { country: "us" } });
        autocomplete.addListener('place_changed', function() {
            const place = autocomplete.getPlace();
            if (!place.geometry) return;
            const bounds = place.geometry.viewport;
            const latMid = (bounds.getNorthEast().lat() + bounds.getSouthWest().lat()) / 2.0;
            const mPerDegLat = 111132;
            const mPerDegLng = 111412 * Math.cos(latMid * Math.PI / 180);
            const widthFt = Math.abs(bounds.getNorthEast().lng() - bounds.getSouthWest().lng()) * mPerDegLng * 3.28084;
            const heightFt = Math.abs(bounds.getNorthEast().lat() - bounds.getSouthWest().lat()) * mPerDegLat * 3.28084;
            
            // Reduced area multiplier to 0.20 for more accurate yard sizes
            let estimatedGrass = Math.round((widthFt * heightFt) * 0.20);
            window.currentSqFt = (estimatedGrass > 20000) ? 15000 : (estimatedGrass < 3000) ? 4500 : estimatedGrass;
            updatePrice();
        });
    }

    function updatePrice() {
        if (!window.currentSqFt) return;
        let price = window.currentSqFt * COST_PER_SQFT;
        if (document.getElementById('service').value === "BiWeekly") price *= 1.15;
        if (price < MINIMUM_PRICE) price = MINIMUM_PRICE;
        let addons = 0;
        document.querySelectorAll('.addon:checked').forEach(box => addons += parseFloat(box.getAttribute('data-price')));
        const total = Math.round(price + addons);
        document.getElementById('priceBox').style.display = 'block';
        document.getElementById('priceLabel').innerText = "$" + total;
        document.getElementById('hiddenPrice').value = "$" + total;
    }

    document.getElementById('service').addEventListener('change', updatePrice);
    document.querySelectorAll('.addon').forEach(item => item.addEventListener('change', updatePrice));
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>
</body>
</html>

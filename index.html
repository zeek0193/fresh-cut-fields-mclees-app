<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fresh Cut Fields and McLees</title>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places,geometry,drawing"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    input, select, button { margin: 5px 0; padding: 10px; width: 100%; }
    #map { height: 300px; margin-top: 10px; }
  </style>
</head>

<body>
  <h1>Fresh Cut Fields and McLees</h1>
  <p>Call/Text: 417-499-1916</p>

  <input id="address" placeholder="Enter your address" />

  <div id="map"></div>

  <p id="size"></p>
  <p id="price"></p>

  <select id="service">
    <option>Mowing</option>
    <option>Limb Pick Up</option>
    <option>Gutter Cleaning</option>
    <option>Landscaping</option>
  </select>

  <button onclick="submitQuote()">Get Quote</button>

  <script>
    let map, drawingManager;

    function initMap() {
      map = new google.maps.Map(document.getElementById(\"map\"), {
        center: { lat: 37.05, lng: -93.3 },
        zoom: 15,
      });

      const autocomplete = new google.maps.places.Autocomplete(
        document.getElementById(\"address\")
      );

      autocomplete.addListener(\"place_changed\", () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;
        map.setCenter(place.geometry.location);
        map.setZoom(18);
      });

      drawingManager = new google.maps.drawing.DrawingManager({
        drawingMode: google.maps.drawing.OverlayType.POLYGON,
        drawingControl: true,
        drawingModes: [\"polygon\"],
      });

      drawingManager.setMap(map);

      google.maps.event.addListener(drawingManager, \"overlaycomplete\", function(event) {
        const area = google.maps.geometry.spherical.computeArea(event.overlay.getPath());
        const sqft = Math.round(area * 10.764);

        document.getElementById(\"size\").innerText = \"Lawn Size: \" + sqft + \" sq ft\";

        let price = Math.max(40, sqft * 0.015);

        const service = document.getElementById(\"service\").value;

        if (service === \"Gutter Cleaning\") price += 75;
        if (service === \"Landscaping\") price += 100;
        if (service === \"Limb Pick Up\") price += 50;

        document.getElementById(\"price\").innerText = \"Estimated Price: $\" + Math.round(price);
      });
    }

    function submitQuote() {
      alert(\"Quote submitted! We will contact you shortly.\");
    }

    window.onload = initMap;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees</title>
    <style>
        body { background: #1a1a1a; font-family: sans-serif; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #2b1d0e; padding: 25px; border-radius: 20px; border: 3px solid #5d4037; max-width: 450px; width: 100%; }
        .logo { max-width: 100%; border-radius: 12px; margin-bottom: 20px; border: 2px solid #d4af37; }
        label { display: block; margin-top: 15px; color: #d4af37; font-weight: bold; font-size: 12px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; font-size: 16px; }
        .price-display { background: #1b5e20; padding: 20px; border-radius: 15px; text-align: center; margin: 15px 0; display: none; border: 2px solid #d4af37; }
        button { width: 100%; padding: 18px; background: #2d5a27; color: #fff; border: 2px solid #d4af37; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .sqft-text { font-size: 14px; color: #f1e5ac; margin-bottom: 5px; font-weight: bold; }
        /* Hidden canvas for satellite analysis */
        #analysisCanvas { display: none; }
    </style>
</head>
<body>

<img src="IMG_20260325_165435.jpg" class="logo">

<div class="card">
    <form action="https://getform.io/f/m56kua56s1k" method="POST">
        <label>NAME</label>
        <input type="text" name="customer_name" required>

        <label>ADDRESS</label>
        <input type="text" id="autocomplete" name="address" placeholder="Calculating lawn from satellite..." required>

        <div id="priceBox" class="price-display">
            <div id="sqftDisplay" class="sqft-text">ANALYZING GREENERY...</div>
            <h2 id="priceLabel" style="font-size: 44px; margin: 0;">--</h2>
            <input type="hidden" name="quote_price" id="hiddenPrice">
            <input type="hidden" name="satellite_sqft" id="hiddenSqft">
        </div>

        <label>SERVICE</label>
        <select name="frequency" id="service">
            <option value="Weekly">Weekly Mowing</option>
            <option value="Bi-Weekly">Bi-Weekly Mowing</option>
        </select>

        <label>ADD-ONS</label>
        <div style="font-size: 14px; margin-top: 10px;">
            <input type="checkbox" name="tick_flea" class="addon" data-price="35"> Tick & Flea (+$35)<br>
            <input type="checkbox" name="bug_spray" class="addon" data-price="30"> Bug Spray (+$30)<br>
            <input type="checkbox" name="limb_pickup" class="addon" data-price="50"> Limb Pick Up (+$50)
        </div>

        <button type="submit">SUBMIT QUOTE</button>
    </form>
</div>

<canvas id="analysisCanvas" width="300" height="300"></canvas>

<script>
    const API_KEY = 'AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk'; // Your Google API Key
    const RATE = 0.0038; 
    const BASE_MIN = 35.00;

    function initAutocomplete() {
        const input = document.getElementById('autocomplete');
        const auto = new google.maps.places.Autocomplete(input, { 
            types: ['address'], 
            fields: ['geometry', 'formatted_address'],
            componentRestrictions: {country: 'us'} 
        });

        auto.addListener('place_changed', function() {
            const place = auto.getPlace();
            if (!place.geometry) return;

            document.getElementById('priceBox').style.display = 'block';
            document.getElementById('sqftDisplay').innerText = "SCANNING SATELLITE...";

            const lat = place.geometry.location.lat();
            const lng = place.geometry.location.lng();
            
            analyzeSatellite(lat, lng);
        });
    }

    function analyzeSatellite(lat, lng) {
        const canvas = document.getElementById('analysisCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const img = new Image();
        
        // Fetch a high-res satellite image centered on the home
        img.crossOrigin = "Anonymous";
        img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;

        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0, 0, 300, 300).data;
            let greenPixels = 0;

            // Loop through pixels and count "Green-dominant" ones (Grass/Trees)
            for (let i = 0; i < imgData.length; i += 4) {
                const r = imgData[i];
                const g = imgData[i + 1];
                const b = imgData[i + 2];
                
                // Detection logic for green grass vs gray pavement/brown roofs
                if (g > r && g > b && g > 40) {
                    greenPixels++;
                }
            }

            // Convert pixel count to approximate Sq Ft (Zoom 20 specific ratio)
            const ratio = 0.15; 
            let detectedSqFt = greenPixels * ratio;

            // Filter out extreme errors
            if (detectedSqFt < 3500) detectedSqFt = 4500;
            if (detectedSqFt > 30000) detectedSqFt = 22000;

            window.currentSqFt = Math.round(detectedSqFt / 250) * 250;
            update();
        };
    }

    function update() {
        if (!window.currentSqFt) return;
        
        let price = window.currentSqFt * RATE;
        if (document.getElementById('service').value === "Bi-Weekly") price *= 1.25;
        if (price < BASE_MIN) price = BASE_MIN;

        let addons = 0;
        document.querySelectorAll('.addon:checked').forEach(a => addons += parseFloat(a.dataset.price));
        
        const total = Math.round(price + addons);
        
        document.getElementById('sqftDisplay').innerText = "SATELLITE EST: " + window.currentSqFt.toLocaleString() + " SQ FT";
        document.getElementById('priceLabel').innerText = "$" + total;
        document.getElementById('hiddenPrice').value = "$" + total;
        document.getElementById('hiddenSqft').value = window.currentSqFt;
    }

    document.getElementById('service').onchange = update;
    document.querySelectorAll('.addon').forEach(a => a.onchange = update);
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>

</body>
</html>

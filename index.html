<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees | Instant Quote</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { background:#1a1a1a; font-family:sans-serif; color:#fff; padding:20px; display:flex; flex-direction:column; align-items:center; }
        .logo-box { text-align:center; margin-bottom:20px; }
        .card { background:#2b1d0e; padding:25px; border-radius:20px; border:3px solid #5d4037; max-width:450px; width:100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        label { margin-top:12px; display:block; color:#d4af37; font-size:12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:none; box-sizing: border-box; font-size: 16px; background: #fff; color: #000; }
        
        .price-box { 
            background: linear-gradient(180deg, #1b5e20, #2d5a27); 
            padding: 20px; border-radius: 15px; text-align: center; 
            margin: 15px 0; display: none; border: 2px solid #d4af37; 
        }

        .addon-section { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #5d4037; }
        .addon-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; color: #fff; }
        .addon-item input { width: 22px; height: 22px; margin-right: 12px; cursor: pointer; width: auto; }

        .g-recaptcha { margin: 15px 0; display: flex; justify-content: center; }
        
        button { 
            width:100%; padding:18px; margin-top:10px; background:#2d5a27; color:#fff; 
            border: 2px solid #d4af37; border-radius:12px; font-size:18px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #1b5e20; }
        button:disabled { background: #444; border-color: #666; cursor: not-allowed; }
        
        .trap { display: none !important; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="logo-box">
    <h1 style="color:#d4af37; margin-bottom:5px;">Fresh Cut Fields & McLees</h1>
    <p style="margin-top:0; color:#aaa; font-size: 14px;">Premium Professional Lawn Care</p>
</div>

<div class="card">
    <form id="mainForm">
        <label>Full Name</label>
        <input type="text" name="Name" required placeholder="Name">

        <label>Phone</label>
        <input type="tel" name="Phone" required placeholder="Phone Number">

        <label>Service Address</label>
        <input type="text" id="autocomplete" name="Address" required placeholder="Enter your address...">
        
        <input type="text" name="_gotcha" class="trap" tabindex="-1" autocomplete="off">

        <div id="priceBox" class="price-box">
            <p style="margin:0; font-size:12px; text-transform:uppercase; color:#d4af37;">Estimated Quote</p>
            <h2 id="priceLabel" style="font-size: 50px; margin: 5px 0;">$--</h2>
            <p id="sqftDisplay" style="margin:0; font-size:11px; opacity:0.8;">Analyzing...</p>
            <input type="hidden" name="Quote_Total" id="hiddenPrice">
            <input type="hidden" name="Lawn_Sqft" id="hiddenSqft">
        </div>

        <label>Mowing Frequency</label>
        <select name="Frequency" id="service">
            <option value="Weekly">Weekly (Standard)</option>
            <option value="Bi-Weekly">Bi-Weekly (+25%)</option>
        </select>

        <label>Add-Ons</label>
        <div class="addon-section">
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Limb_Pickup" data-price="45">
                <span>Limb Pickup (+$30)</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Flea_Tick" data-price="65">
                <span>Flea & Tick (+$25)</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Bug_Spray" data-price="55">
                <span>Bug Spray (+$20)</span>
            </div>
        </div>

        <div class="g-recaptcha" data-sitekey="6Ldwa7QsAAAAANHYYOxGPxTi5dvfoqStOZLzXFt0"></div>

        <button type="submit" id="submitBtn" disabled>Enter Address First</button>
    </form>
</div>

<canvas id="canvas" width="300" height="300"></canvas>

<script>
const API_KEY = "AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk"; 
const BASE_FEE = 40.00;    // The base "show-up" price
const RATE_PER_SQFT = 0.009; // $80 per 10k sqft additional

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);
    auto.addListener("place_changed", () => {
        const place = auto.getPlace();
        if(!place.geometry) return;
        document.getElementById("submitBtn").innerText = "Analyzing Satellite...";
        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat, lng) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;
    
    img.onload = () => {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, 300, 300).data;
        
        let grassPixels = 0;
        for(let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if(g > r * 1.15 && g > b * 1.15 && g > 70) grassPixels++;
        }

        // Calculate SQFT with a realistic minimum
        window.sqft = Math.round(Math.max(2500, Math.min(40000, grassPixels * 0.4)));
        
        update();
        document.getElementById("priceBox").style.display = "block";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").innerText = "Submit Quote Request";
        document.getElementById("sqftDisplay").innerText = "Estimated Area: " + window.sqft.toLocaleString() + " sqft";
    };
}

function update() {
    if(!window.sqft) return;

    // Start with the $40 Base Fee
    let price = BASE_FEE;

    // Add square footage cost (e.g., first 2500 sqft is covered by base, or added on top)
    // Here, we add the rate to the base for every sqft found.
    price += (window.sqft * RATE_PER_SQFT);

    // Apply Bi-Weekly Surcharge
    if (document.getElementById("service").value === "Bi-Weekly") {
        price *= 1.35; 
    }

    // Add Add-ons
    document.querySelectorAll(".addon:checked").forEach(addon => {
        price += parseFloat(addon.dataset.price);
    });

    const finalPrice = Math.round(price);

    document.getElementById("priceLabel").innerText = "$" + finalPrice;
    document.getElementById("hiddenPrice").value = "$" + finalPrice;
    document.getElementById("hiddenSqft").value = window.sqft;
}

document.getElementById("service").onchange = update;
document.querySelectorAll(".addon").forEach(checkbox => {
    checkbox.onchange = update;
});

document.getElementById('mainForm').onsubmit = function(e) {
    e.preventDefault();
    if (!grecaptcha.getResponse()) {
        alert("Please complete the reCAPTCHA.");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Sending...";

    const formData = new FormData(this);
    fetch("https://getform.io/f/m56kua56s1k", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
    })
    .then(response => {
        if (response.ok) {
            btn.innerText = "Sent Successfully!";
            btn.style.background = "#1b5e20";
        } else {
            throw new Error();
        }
    })
    .catch(() => {
        btn.innerText = "Error. Try again.";
        btn.disabled = false;
    });
};

window.onload = initAutocomplete;
</script>

</body>
</html>

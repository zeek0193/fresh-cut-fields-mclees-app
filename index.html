<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Cut Fields & McLees - Instant Quote</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body { background:#1a1a1a; font-family:sans-serif; color:#fff; padding:20px; display:flex; flex-direction:column; align-items:center; }
        .logo-box { text-align:center; margin-bottom:20px; }
        .card { background:#2b1d0e; padding:25px; border-radius:20px; border:3px solid #5d4037; max-width:450px; width:100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        label { margin-top:12px; display:block; color:#d4af37; font-size:12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:1px solid #444; box-sizing: border-box; font-size: 16px; background: #fff; }
        
        .price-box { 
            background: linear-gradient(180deg, #1b5e20, #2d5a27); 
            padding: 20px; border-radius: 15px; text-align: center; 
            margin: 15px 0; display: none; border: 2px solid #d4af37; 
            animation: fadeIn 0.5s ease-in;
        }

        .addon-section { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #5d4037; }
        .addon-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; color: #fff; }
        .addon-item input { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; width: auto; }

        .g-recaptcha { margin: 15px 0; display: flex; justify-content: center; }
        
        button { 
            width:100%; padding:18px; margin-top:10px; background:#2d5a27; color:#fff; 
            border: 2px solid #d4af37; border-radius:12px; font-size:18px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #1b5e20; transform: translateY(-2px); }
        button:disabled { background: #444; border-color: #666; cursor: not-allowed; transform: none; }
        
        .trap { display: none !important; }
        canvas { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="logo-box">
    <h1 style="color:#d4af37; margin-bottom:5px;">Fresh Cut Fields & McLees</h1>
    <p style="margin-top:0; font-size:14px; color:#aaa;">Satellite-Powered Lawn Estimation</p>
</div>

<div class="card">
    <form id="mainForm">
        <label>Full Name</label>
        <input type="text" name="Name" required placeholder="John Doe">

        <label>Phone</label>
        <input type="tel" name="Phone" required placeholder="(555) 000-0000">

        <label>Service Address</label>
        <input type="text" id="autocomplete" name="Address" required placeholder="Start typing your address...">
        
        <input type="text" name="_gotcha" class="trap" tabindex="-1" autocomplete="off">

        <div id="priceBox" class="price-box">
            <p style="margin:0; font-size:12px; text-transform:uppercase;">Estimated Quote</p>
            <h2 id="priceLabel" style="font-size: 48px; margin: 5px 0;">$--</h2>
            <p id="sqftDisplay" style="margin:0; font-size:12px; opacity:0.8;">Analyzing...</p>
            <input type="hidden" name="Quote_Total" id="hiddenPrice">
            <input type="hidden" name="Lawn_Sqft" id="hiddenSqft">
        </div>

        <label>Mowing Frequency</label>
        <select name="Frequency" id="service">
            <option value="Weekly">Weekly (Recommended)</option>
            <option value="Bi-Weekly">Bi-Weekly (+30%)</option>
        </select>

        <label>Add-Ons</label>
        <div class="addon-section">
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Limb_Pickup" data-price="25">
                <span>Limb Pickup (+$25)</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Flea_Tick" data-price="45">
                <span>Flea & Tick (+$45)</span>
            </div>
            <div class="addon-item">
                <input type="checkbox" class="addon" name="Bug_Spray" data-price="40">
                <span>Perimeter Bug Spray (+$40)</span>
            </div>
        </div>

        <div class="g-recaptcha" data-sitekey="YOUR_RECAPTCHA_KEY"></div>

        <button type="submit" id="submitBtn" disabled>Enter Address First</button>
    </form>
</div>

<canvas id="canvas" width="300" height="300"></canvas>

<script>
// --- CONFIGURATION ---
const API_KEY = "YOUR_API_KEY_HERE"; 
const BASE_FEE = 40;          // Minimum "show-up" price
const TIER_1_RATE = 0.006;    // Price for first 5,000 sqft
const TIER_2_RATE = 0.004;    // Price for anything over 5,000 sqft

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input, {
        componentRestrictions: { country: "us" },
        fields: ["geometry", "formatted_address"]
    });

    auto.addListener("place_changed", () => {
        const place = auto.getPlace();
        if(!place.geometry) return;
        document.getElementById("submitBtn").innerText = "Analyzing Satellite View...";
        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat, lng) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    // We use zoom 20 for a tight crop on the property
    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;
    
    img.onload = () => {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, 300, 300).data;
        
        let grassPixels = 0;
        for(let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            // Green detection logic: Green must be dominant and above a brightness threshold
            if(g > r * 1.1 && g > b * 1.1 && g > 60) {
                grassPixels++;
            }
        }

        // Logic: 300x300 pixels at zoom 20 covers roughly 15k-20k sqft. 
        // 0.3 factor is an estimate of sqft per pixel at this latitude.
        let calculatedSqft = Math.round(grassPixels * 0.32);
        
        // Sanity Check: Cap the auto-quote between a small yard and a large estate
        window.sqft = Math.max(2000, Math.min(30000, calculatedSqft));
        
        update();
        document.getElementById("priceBox").style.display = "block";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").innerText = "Send Quote Request";
        document.getElementById("sqftDisplay").innerText = "Estimated Turf: " + window.sqft.toLocaleString() + " sqft";
    };
}

function update() {
    if(!window.sqft) return;

    let subtotal = 0;

    // Apply Tiered Pricing
    if (window.sqft <= 5000) {
        subtotal = window.sqft * TIER_1_RATE;
    } else {
        subtotal = (5000 * TIER_1_RATE) + ((window.sqft - 5000) * TIER_2_RATE);
    }

    // Ensure it meets the minimum Base Fee
    if (subtotal < BASE_FEE) subtotal = BASE_FEE;

    // Apply Frequency Surcharge
    if(document.getElementById("service").value === "Bi-Weekly") {
        subtotal *= 1.30; 
    }

    // Add selected Add-ons
    document.querySelectorAll(".addon:checked").forEach(addon => {
        subtotal += parseFloat(addon.dataset.price);
    });

    const finalPrice = Math.round(subtotal);
    
    document.getElementById("priceLabel").innerText = "$" + finalPrice;
    document.getElementById("hiddenPrice").value = "$" + finalPrice;
    document.getElementById("hiddenSqft").value = window.sqft;
}

// Event Listeners
document.getElementById("service").onchange = update;
document.querySelectorAll(".addon").forEach(checkbox => {
    checkbox.onchange = update;
});

// Form Submission
document.getElementById('mainForm').onsubmit = function(e) {
    e.preventDefault();
    
    if (typeof grecaptcha !== 'undefined' && grecaptcha.getResponse() === "") {
        alert("Please confirm you are human.");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Processing...";

    const formData = new FormData(this);
    fetch("https://getform.io/f/m56kua56s1k", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
    })
    .then(response => {
        if (response.ok) {
            btn.innerText = "Quote Sent!";
            btn.style.background = "#1b5e20";
        } else {
            throw new Error();
        }
    })
    .catch(() => {
        alert("There was an error. Please try again.");
        btn.disabled = false;
        btn.innerText = "Send Quote Request";
    });
};

// Initialize Google Maps on load
window.onload = initAutocomplete;
</script>

</body>
</html>

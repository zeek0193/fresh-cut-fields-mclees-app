<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Cut Fields & McLees</title>
<style>
    body { background:#1a1a1a; font-family:sans-serif; color:#fff; padding:20px; display:flex; flex-direction:column; align-items:center; }
    .logo-box { text-align:center; margin-bottom:20px; }
    .logo-box img { width:350px; max-width:100%; border-radius:12px; border:2px solid #d4af37; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .card { background:#2b1d0e; padding:25px; border-radius:20px; border:3px solid #5d4037; max-width:450px; width:100%; }
    label { margin-top:12px; display:block; color:#d4af37; font-size:12px; font-weight: bold; text-transform: uppercase; }
    input, select { width:100%; padding:12px; margin-top:5px; border-radius:8px; border:none; box-sizing: border-box; font-size: 16px; }
    .price-box { background: linear-gradient(180deg, #1b5e20, #2d5a27); padding: 20px; border-radius: 15px; text-align: center; margin: 15px 0; display: none; border: 2px solid #d4af37; }
    button { width:100%; padding:18px; margin-top:10px; background:#2d5a27; color:#fff; border: 2px solid #d4af37; border-radius:12px; font-size:18px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #444; border-color: #666; cursor: not-allowed; }
    
    /* HONEYPOT BYPASS STYLE */
    .hidden-field {
        display: none !important;
        visibility: hidden;
    }
</style>
</head>
<body>

<div class="logo-box">
    <img src="IMG_20260325_165435.jpg" alt="Fresh Cut Fields & McLees Logo">
    <p style="color:#f1e5ac; font-weight:bold; margin-top:10px;">Fresh Cut Fields & McLees | 417-499-1916</p>
</div>

<div class="card">
    <form action="https://getform.io/f/m56kua56s1k" method="POST" id="mainForm">

        <label>Name</label>
        <input type="text" name="Name" required>

        <label>Phone</label>
        <input type="tel" name="Phone" required>

        <label>Service Address</label>
        <input type="text" id="autocomplete" name="Address" required>

        <div class="hidden-field">
            <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
        </div>

        <div id="priceBox" class="price-box">
            <div id="sqftText" style="font-size: 12px; color: #f1e5ac;">SCANNING SATELLITE...</div>
            <h2 id="priceLabel" style="font-size: 40px; margin: 5px 0;">$--</h2>
            
            <input type="hidden" name="Quote_Total" id="hiddenPrice">
            <input type="hidden" name="Estimated_Sqft" id="hiddenSqft">
        </div>

        <label>Frequency</label>
        <select name="Frequency" id="service">
            <option value="Weekly">Weekly</option>
            <option value="Bi-Weekly">Bi-Weekly</option>
        </select>

        <button type="submit" id="submitBtn" disabled>Enter Address to Start</button>
    </form>
</div>

<canvas id="canvas" width="300" height="300" style="display:none;"></canvas>

<script>
const API_KEY = "AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk";
const RATE = 0.0045;

function initAutocomplete(){
    const input = document.getElementById("autocomplete");
    const auto = new google.maps.places.Autocomplete(input);
    auto.addListener("place_changed", ()=>{
        const place = auto.getPlace();
        if(!place.geometry) return;
        document.getElementById("priceBox").style.display = "block";
        document.getElementById("submitBtn").innerText = "Analyzing...";
        analyze(place.geometry.location.lat(), place.geometry.location.lng());
    });
}

function analyze(lat,lng){
    const img = new Image();
    img.crossOrigin="Anonymous";
    img.src = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=20&size=300x300&maptype=satellite&key=${API_KEY}`;
    img.onload = ()=>{
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0);
        const data = ctx.getImageData(0,0,300,300).data;
        let grass=0;
        for(let i=0;i<data.length;i+=4){
            // Specialized Joplin-green detection
            if(data[i+1] > data[i] * 1.15 && data[i+1] > data[i+2] * 1.15 && data[i+1] > 70) grass++;
        }
        window.sqft = Math.round(Math.max(3000, Math.min(20000, grass * 0.35)));
        let price = Math.round(window.sqft * RATE);
        
        document.getElementById("sqftText").innerText = "Est Lawn: " + window.sqft.toLocaleString() + " sq ft";
        document.getElementById("priceLabel").innerText = "$" + price;
        
        // Populate hidden fields to bypass "Empty Submission" error
        document.getElementById("hiddenPrice").value = "$" + price;
        document.getElementById("hiddenSqft").value = window.sqft + " sqft";
        
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").innerText = "Submit Official Quote";
    };
}
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD794oDQ9Y2KHDJJct4wfyPT478Sqf2eQk&libraries=places&callback=initAutocomplete"></script>
</body>
</html>

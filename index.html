<script>
let map;
let polygon = null;

const RATE = 0.0055;
const BASE_MIN = 45;

function initMap() {
    const input = document.getElementById("autocomplete");

    const autocomplete = new google.maps.places.Autocomplete(input, {
        types: ["address"],
        fields: ["geometry"],
        componentRestrictions: { country: "us" }
    });

    map = new google.maps.Map(document.createElement("div"), {
        center: { lat: 37.05, lng: -93.3 },
        zoom: 18,
        mapTypeId: "satellite"
    });

    document.body.appendChild(map.getDiv());
    map.getDiv().style.height = "300px";
    map.getDiv().style.marginTop = "15px";

    autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;

        map.setCenter(place.geometry.location);
    });

    map.addListener("click", (e) => {
        addPoint(e.latLng);
    });
}

let path = [];

function addPoint(latLng) {
    path.push(latLng);

    if (polygon) polygon.setMap(null);

    polygon = new google.maps.Polygon({
        paths: path,
        strokeColor: "#00ff00",
        fillColor: "#00ff00",
        fillOpacity: 0.3,
        map: map
    });

    calculateArea();
}

function calculateArea() {
    if (path.length < 3) return;

    const areaMeters = google.maps.geometry.spherical.computeArea(polygon.getPath());
    const sqft = Math.round(areaMeters * 10.764);

    window.currentSqFt = sqft;

    update();
}

function update() {
    if (!window.currentSqFt) return;

    let price = window.currentSqFt * RATE;

    if (document.getElementById('service').value === "Bi-Weekly") {
        price *= 1.25;
    }

    if (price < BASE_MIN) price = BASE_MIN;

    let addons = 0;
    document.querySelectorAll('.addon:checked').forEach(a => {
        addons += parseFloat(a.dataset.price);
    });

    const total = Math.round(price + addons);

    document.getElementById('priceBox').style.display = 'block';
    document.getElementById('sqftDisplay').innerText =
        "LAWN SIZE: " + window.currentSqFt.toLocaleString() + " SQ FT";
    document.getElementById('priceLabel').innerText = "$" + total;
    document.getElementById('hiddenPrice').value = "$" + total;
    document.getElementById('hiddenSqft').value = window.currentSqFt;
}

document.getElementById('service').onchange = update;
document.querySelectorAll('.addon').forEach(a => a.onchange = update);
</script>
